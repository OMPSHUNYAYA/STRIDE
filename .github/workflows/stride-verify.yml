name: STRIDE Release Integrity

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify repository structure
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          required = [
              "README.md",
              "LICENSE",
              "demo/STRIDE_v1_1_3.html",
              "docs/FAQ.md",
              "docs/Quickstart.md",
              "docs/Shunyaya-Structural-Stack.png",
              "docs/STRIDE-Architecture-Notes.md",
              "docs/STRIDE-Challenge.md",
              "docs/STRIDE-Claim-Boundary.md",
              "docs/STRIDE-Diagram.png",
              "docs/STRIDE-Known-Limitations.md",
              "docs/STRIDE-Motion-Contract.md",
              "docs/STRIDE-Reproduction-Protocol.md",
              "docs/STRIDE-Resolution-Guarantees.md",
              "docs/STRIDE-Runtime-State-Model.md",
              "evidence/EXPECTED_RESULTS.json",
              "evidence/QUALIFICATION_SUMMARY.md",
              "evidence/STRIDE_v1_1_3_346_Case_Qualification_Report.json",
              "evidence/STRIDE_v1_1_3_RELEASE_MANIFEST.json",
              "VERIFY/FREEZE_DEMO_SHA256.txt",
              "VERIFY/RELEASE_CHECKLIST.md",
              "VERIFY/VERIFY.txt",
          ]

          missing = [path for path in required if not Path(path).is_file()]

          if missing:
              print("Missing required files:")
              for path in missing:
                  print("-", path)
              sys.exit(1)

          print("Repository structure verified.")
          PY

      - name: Verify frozen artifact and evidence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json
          import re
          import sys

          EXPECTED_HASH = (
              "4550091e1da5e3e6fcf54f9d641d46ca"
              "1b9200045e0f221d60cf415de633049f"
          )

          artifact = Path("demo/STRIDE_v1_1_3.html")
          freeze_path = Path("VERIFY/FREEZE_DEMO_SHA256.txt")
          expected_path = Path("evidence/EXPECTED_RESULTS.json")
          report_path = Path(
              "evidence/STRIDE_v1_1_3_346_Case_Qualification_Report.json"
          )
          manifest_path = Path(
              "evidence/STRIDE_v1_1_3_RELEASE_MANIFEST.json"
          )

          actual_hash = hashlib.sha256(artifact.read_bytes()).hexdigest().lower()

          if actual_hash != EXPECTED_HASH:
              print("Frozen HTML hash mismatch.")
              print("Expected:", EXPECTED_HASH)
              print("Actual:  ", actual_hash)
              sys.exit(1)

          freeze_text = freeze_path.read_text(
              encoding="utf-8",
              errors="replace",
          )

          recorded_hashes = {
              value.lower()
              for value in re.findall(r"\b[0-9a-fA-F]{64}\b", freeze_text)
          }

          if EXPECTED_HASH not in recorded_hashes:
              print("FREEZE_DEMO_SHA256.txt does not contain the frozen hash.")
              sys.exit(1)

          try:
              expected = json.loads(expected_path.read_text(encoding="utf-8"))
              report = json.loads(report_path.read_text(encoding="utf-8"))
              manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          except (OSError, json.JSONDecodeError) as exc:
              print("Evidence JSON could not be loaded:", exc)
              sys.exit(1)

          failures = []

          def require(condition, message):
              if not condition:
                  failures.append(message)

          qualification = expected.get("qualification", {})
          family_counts = qualification.get("family_case_counts", {})

          require(expected.get("schema") == "stride.expected_results/1.0",
                  "Unexpected EXPECTED_RESULTS schema.")
          require(expected.get("project") == "STRIDE",
                  "Unexpected project identity.")
          require(expected.get("version") == "1.1.3",
                  "EXPECTED_RESULTS version mismatch.")
          require(expected.get("artifact") == "demo/STRIDE_v1_1_3.html",
                  "Artifact path mismatch.")
          require(expected.get("artifact_sha256", "").lower() == EXPECTED_HASH,
                  "EXPECTED_RESULTS hash mismatch.")
          require(
              expected.get("expected_status")
              == "REFERENCE_ARCHITECTURE_VALIDATED",
              "Expected status mismatch.",
          )
          require(
              qualification.get("suite_id") == "stride.qualification/346",
              "Qualification suite mismatch.",
          )
          require(
              qualification.get("runtime_release_version") == "1.1.3",
              "Runtime release version mismatch.",
          )
          require(
              qualification.get("inherited_kernel_version") == "1.0.1",
              "Inherited kernel version mismatch.",
          )
          require(
              qualification.get("total_case_count") == 346,
              "Expected case count mismatch.",
          )
          require(
              qualification.get("allPass") is True,
              "Expected allPass is not true.",
          )
          require(
              qualification.get("unsafe_admissions") == 0,
              "Expected unsafe admissions are not zero.",
          )
          require(
              sum(family_counts.values()) == 346,
              "Qualification family counts do not total 346.",
          )

          require(report.get("version") == "1.1.3",
                  "Report version mismatch.")
          require(report.get("runtime_release_version") == "1.1.3",
                  "Report runtime release version mismatch.")
          require(report.get("inherited_kernel_version") == "1.0.1",
                  "Report inherited kernel version mismatch.")
          require(
              report.get("qualification_suite_id")
              == "stride.qualification/346",
              "Report qualification suite mismatch.",
          )
          require(report.get("total_case_count") == 346,
                  "Report case count mismatch.")
          require(report.get("allPass") is True,
                  "Report allPass is not true.")
          require(report.get("unsafe_admissions") == 0,
                  "Report unsafe admissions are not zero.")

          report_family_counts = {
              "runtime_scenarios": report.get("case_count"),
              "core_conformance": report.get("core_case_count"),
              "falsification": report.get("falsification_case_count"),
              "digital_twin": report.get("twin_case_count"),
              "middleware_adapter": report.get("adapter_case_count"),
              "hil_boundary": report.get("hil_case_count"),
              "physical_pilot": report.get("pilot_case_count"),
              "production_candidate": report.get("production_case_count"),
              "limited_deployment": report.get("deployment_case_count"),
          }

          require(
              report_family_counts == family_counts,
              "Report family counts differ from EXPECTED_RESULTS.",
          )

          expected_scenarios = {
              "ambiguous": "INCOMPLETE",
              "conflict": "CONFLICT",
              "human": "FORBIDDEN",
              "forbidden": "FORBIDDEN",
              "force": "FORBIDDEN",
              "resolved": "RESOLVED",
          }

          observed_scenarios = {
              row.get("scenario"): row.get("actual")
              for row in report.get("cases", [])
          }

          require(
              observed_scenarios == expected_scenarios,
              "Runtime scenario outcomes differ from the frozen report.",
          )
          require(
              all(row.get("pass") is True for row in report.get("cases", [])),
              "One or more runtime scenarios did not pass.",
          )

          release = manifest.get("release", {})
          manifest_qualification = release.get("qualification", {})
          runtime = manifest.get("runtime", {})

          require(release.get("name") == "STRIDE",
                  "Manifest project name mismatch.")
          require(release.get("version") == "1.1.3",
                  "Manifest version mismatch.")
          require(
              release.get("status") == "REFERENCE_ARCHITECTURE_VALIDATED",
              "Manifest status mismatch.",
          )
          require(
              release.get("artifact_filename") == "STRIDE_v1_1_3.html",
              "Manifest artifact filename mismatch.",
          )
          require(
              manifest_qualification.get("suite_id")
              == "stride.qualification/346",
              "Manifest qualification suite mismatch.",
          )
          require(
              manifest_qualification.get("total_cases") == 346,
              "Manifest case count mismatch.",
          )
          require(
              manifest_qualification.get("expected_unsafe_admissions") == 0,
              "Manifest unsafe-admission expectation mismatch.",
          )
          require(
              manifest_qualification.get("inherited_kernel_version") == "1.0.1",
              "Manifest inherited kernel mismatch.",
          )
          require(runtime.get("version") == "1.1.3",
                  "Manifest runtime version mismatch.")
          require(
              runtime.get("verification_loaded") is False,
              "Manifest must declare verification unloaded at startup.",
          )

          if failures:
              print("Release integrity verification failed:")
              for failure in failures:
                  print("-", failure)
              sys.exit(1)

          print("Frozen HTML hash verified:", actual_hash)
          print("Evidence JSON verified.")
          print("Qualification: 346 / 346")
          print("Unsafe admissions: 0")
          PY
